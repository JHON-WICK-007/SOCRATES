services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
      - ai-service
    networks:
      - socrates-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/socrates
    depends_on:
      - mongo
    networks:
      - socrates-net

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    ports:
      - "8000:7860"
    environment:
      - HOST=0.0.0.0
      - PORT=7860
    networks:
      - socrates-net

  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - socrates-net

networks:
  socrates-net:
    driver: bridge

volumes:
  mongodb_data:
